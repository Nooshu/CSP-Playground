# Dependabot — https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Yarn v1 lockfile + package.json (npm ecosystem covers both)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: deps

  # GitHub Actions (when workflows are added)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
