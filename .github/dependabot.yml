# Dependabot — https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Division of labour with Renovate (see renovate.json):
#   - Dependabot: GitHub Actions workflow pins
#   - Renovate: npm / Yarn dependencies (exact-version pinning policy)
#
# npm security advisories may still open Dependabot security PRs via GitHub's
# default vulnerability alerts; Renovate vulnerabilityAlerts covers the same
# packages on its schedule. Close whichever duplicate arrives second.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
