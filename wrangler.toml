name = "csp-builder"
compatibility_date = "2024-09-23"
main = "./dist/_worker/index.js"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

# Pages v3 build image: Node 22.16.0 (see .nvmrc), Yarn 1.22.22 via dashboard
# YARN_VERSION=1.22.22 — required; v3 defaults to Yarn 4 and will not read yarn.lock v1.
#
# Workers Builds deploy command: npx wrangler deploy
# (Do not use wrangler pages deploy — the CI token lacks Pages API permissions.)
